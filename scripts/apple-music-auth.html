<!doctype html>
<!--
  One-time Apple Music user token mint. MusicKit JS only runs in the browser,
  so this static page bridges the auth flow:

  1. Run `bun scripts/mintAppleDevToken.ts` and paste the printed JWT below.
  2. Click "Sign in to Apple Music" — Apple opens a popup, you authorize.
  3. Copy the printed user token into the cron's .env as APPLE_MUSIC_USER_TOKEN.

  The user token is long-lived (months). Re-run when it expires.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Apple Music auth (one-time)</title>
    <meta name="apple-music-developer-token" content="" />
    <meta name="apple-music-app-name" content="briOS Listening Cron" />
    <meta name="apple-music-app-build" content="1" />
    <script src="https://js-cdn.music.apple.com/musickit/v1/musickit.js"></script>
    <style>
      body {
        font: 14px/1.5 ui-monospace, monospace;
        max-width: 720px;
        margin: 40px auto;
        padding: 0 16px;
      }
      textarea,
      input {
        width: 100%;
        font-family: inherit;
        font-size: 12px;
        padding: 8px;
        margin-top: 4px;
        box-sizing: border-box;
      }
      textarea {
        height: 100px;
      }
      button {
        margin-top: 12px;
        padding: 8px 16px;
        cursor: pointer;
      }
      button[disabled] {
        opacity: 0.5;
        cursor: not-allowed;
      }
      pre {
        background: #f3f3f3;
        padding: 12px;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .ok {
        color: #0a7;
      }
      .err {
        color: #c00;
      }
      label {
        display: block;
        margin-top: 16px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <h1>Apple Music user token (one-time)</h1>

    <label>Developer token (from <code>bun scripts/mintAppleDevToken.ts</code>)</label>
    <textarea id="dev" placeholder="eyJhbGciOi..."></textarea>

    <button id="init">Initialize MusicKit</button>
    <button id="signin" disabled>Sign in to Apple Music</button>

    <div id="status"></div>
    <label>User token (paste into cron .env as <code>APPLE_MUSIC_USER_TOKEN</code>)</label>
    <pre id="out">—</pre>

    <script>
      const $ = (id) => document.getElementById(id);
      const status = (msg, ok) => {
        $("status").innerHTML = `<p class="${ok ? "ok" : "err"}">${msg}</p>`;
      };

      $("init").onclick = () => {
        const dev = $("dev").value.trim();
        if (!dev) return status("Paste the developer token first.", false);
        try {
          MusicKit.configure({
            developerToken: dev,
            app: { name: "briOS Listening Cron", build: "1" },
          });
          status("MusicKit configured. Click sign-in.", true);
          $("signin").disabled = false;
        } catch (e) {
          status("Configure failed: " + e.message, false);
        }
      };

      $("signin").onclick = async () => {
        if (location.protocol === "file:") {
          return status(
            "Open this page via http://localhost (file:// breaks Apple's auth popup). " +
              "Run `python3 -m http.server 8000` in this folder, then load http://localhost:8000/apple-music-auth.html.",
            false,
          );
        }
        try {
          const music = MusicKit.getInstance();
          // authorize() returns the user token directly in MusicKit JS v1.
          const returnedToken = await music.authorize();
          const token = returnedToken || music.musicUserToken;
          console.log("authorize() returned:", returnedToken);
          console.log("instance.musicUserToken:", music.musicUserToken);
          console.log("instance.isAuthorized:", music.isAuthorized);
          if (!token) {
            return status(
              "Authorization completed but no token returned. Check the browser console for details, then retry.",
              false,
            );
          }
          $("out").textContent = token;
          status("Authorized. Copy the user token above.", true);
        } catch (e) {
          console.error(e);
          status("Authorize failed: " + (e?.message || e), false);
        }
      };
    </script>
  </body>
</html>
